<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SkillSwap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* ── LOGIN PAGE SPECIFIC ── */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    .nav-center {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .nav-center a {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink3);
      padding: 6px 14px;
      border-radius: var(--r-btn);
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .nav-center a:hover {
      color: var(--flame-lt);
      border: 1px solid var(--flame);
      box-shadow: 0 0 10px rgba(249, 115, 22, 0.25);
      background: transparent;
    }

    .nav-center a.active {
      background: var(--flame);
      color: #1a0a00;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-end;
    }

    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    .main-content::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.1) 0%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Auth card */
    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 22px;
      padding: 2.8rem 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(249, 115, 22, 0.06);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.5s ease forwards;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2rem;
    }

    .auth-logo-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--flame);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-logo-icon svg {
      width: 17px;
      height: 17px;
    }

    .auth-logo-name {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1rem;
      color: var(--ink);
    }

    .auth-heading {
      font-family: var(--font-head);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }

    .auth-heading span {
      color: var(--flame);
    }

    .auth-subtitle {
      font-size: 0.88rem;
      color: var(--ink3);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* Alerts */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }

    .alert-error {
      background: rgba(248, 113, 113, 0.1);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.25);
    }

    .alert-success {
      background: rgba(74, 222, 128, 0.1);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.25);
    }

    /* Form */
    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink2);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border2);
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: var(--font-body);
      background: var(--bg3);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--flame);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12);
    }

    .form-group input::placeholder {
      color: var(--ink4);
    }

    .pw-row {
      position: relative;
    }

    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink3);
      font-size: 1rem;
      padding: 4px;
      transition: color 0.2s;
    }

    .pw-toggle:hover {
      color: var(--flame-lt);
    }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -0.6rem;
      margin-bottom: 1.2rem;
    }

    .forgot-link {
      font-size: 0.78rem;
      color: var(--ink3);
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: var(--flame-lt);
    }

    /* Submit */
    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      background: var(--flame);
      color: #1a0a00;
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--r-btn);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 0 24px rgba(249, 115, 22, 0.35);
      letter-spacing: -0.01em;
    }

    .btn-submit:hover {
      background: var(--flame-lt);
      box-shadow: 0 0 36px rgba(249, 115, 22, 0.5);
      transform: translateY(-1px);
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    /* Divider & footer */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1.6rem 0;
    }

    .auth-divider hr {
      flex: 1;
      border: none;
      border-top: 1px solid var(--border);
    }

    .auth-divider span {
      font-size: 0.78rem;
      color: var(--ink3);
      white-space: nowrap;
    }

    .auth-footer {
      text-align: center;
      font-size: 0.875rem;
      color: var(--ink3);
    }

    .auth-footer a {
      color: var(--flame-lt);
      font-weight: 600;
      transition: color 0.2s;
    }

    .auth-footer a:hover {
      color: var(--flame);
    }

    .site-footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.2rem;
      font-size: 0.78rem;
      color: var(--ink4);
      border-top: 1px solid var(--border);
      background: var(--bg2);
    }

    @media (max-width: 600px) {
      .navbar {
        padding: 0 1.5rem;
      }

      .nav-center {
        display: none;
      }

      .auth-card {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <a href="index.html" class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 4C9.8 4 8 5.8 8 8s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zm-7 14c0-3.3 3.1-6 7-6s7 2.7 7 6"
            stroke="#1a0a00" stroke-width="2" stroke-linecap="round" />
          <path
            d="M5 12c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3zm14 0c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"
            fill="#1a0a00" />
        </svg>
      </div>
      <span class="logo-name">SkillSwap</span>
    </a>
    <nav class="nav-center">
      <a href="login.html" class="active">Login</a>
      <a href="signup.html">Sign Up</a>
    </nav>
    <div class="nav-right"></div>
  </nav>

  <main class="main-content">
    <div class="auth-card">
      <div class="auth-top">
        <div class="auth-logo-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 4C9.8 4 8 5.8 8 8s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zm-7 14c0-3.3 3.1-6 7-6s7 2.7 7 6"
              stroke="#1a0a00" stroke-width="2" stroke-linecap="round" />
          </svg>
        </div>
        <span class="auth-logo-name">SkillSwap</span>
      </div>
      <h1 class="auth-heading">Welcome <span>Back</span></h1>
      <p class="auth-subtitle">Log in to continue exchanging skills</p>
      <div class="alert alert-error" id="formError"></div>
      <div class="alert alert-success" id="formSuccess"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="pw-row">
            <input type="password" id="password" name="password" required placeholder="Your password">
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password">👁</button>
          </div>
        </div>
        <div class="forgot-row"><a href="#" class="forgot-link">Forgot password?</a></div>
        <button type="submit" class="btn-submit">Log In →</button>
      </form>
      <div class="auth-divider">
        <hr><span>Don't have an account?</span>
        <hr>
      </div>
      <p class="auth-footer">New here? <a href="signup.html">Create an account</a></p>
    </div>
  </main>

  <footer class="site-footer">© 2025 SkillSwap. Exchange skills, not money.</footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    // ── Password toggle ──────────────────────────
    const pwToggle = document.getElementById('pwToggle');
    const pwInput = document.getElementById('password');
    pwToggle.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      pwToggle.textContent = show ? '🙈' : '👁';
    });

    // ── AJAX Login ────
    $('#loginForm').on('submit', function (e) {
      e.preventDefault();
      const formError = $('#formError');
      const formSuccess = $('#formSuccess');
      formError.hide();
      formSuccess.hide();

      const email = $('#email').val().trim();
      const password = $('#password').val().trim();

      if (!email || !password) {
        formError.text('Please fill in all fields.').show();
        return;
      }

      const $btn = $(this).find('button[type="submit"]');
      $btn.prop('disabled', true).text('Logging in...');

      $.ajax({
        url: 'api/login.php',
        type: 'POST',
        contentType: 'application/json',

        // new line added here to specify that we expect JSON back from the server
        dataType: 'json',
        data: JSON.stringify({ email, password }),
        success: function (res) {
          // if (res.success) {
          if (res.success === true) {
            // Store user info in localStorage for session-like behaviour
            localStorage.setItem('skillswap_user', JSON.stringify(res.user));
            formSuccess.text(res.message).show();
            setTimeout(() => { window.location.href = 'pages/home.html'; }, 1000);
          } else {
            formError.text(res.message).show();
            $btn.prop('disabled', false).text('Log In →');
          }
        },
        error: function (xhr) {
          console.log("Error response:", xhr.responseText); // 🔍 debug
          formError.text('Server error. Please try again.').show();
          $btn.prop('disabled', false).text('Log In →');
        }
      });
    });
  </script>
  <script src="js/main.js"></script>
</body>

</html>
